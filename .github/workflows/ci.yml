name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'backend/requirements.txt'

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install ruff black
        pip install -r requirements.txt
        pip install alembic

    - name: Lint with Ruff
      run: ruff check backend/

    - name: Format with Black
      run: black --check backend/

    - name: Check Alembic Schema Drift
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/awa_test
      run: |
        alembic upgrade head
        alembic check

    - name: Check OpenAPI types are up to date
      run: |
        cd backend
        python -c "
        from app.main import app
        import json
        from fastapi.testclient import TestClient
        client = TestClient(app, raise_server_exceptions=False)
        with open('../frontend/openapi.json', 'w') as f:
            json.dump(client.get('/openapi.json').json(), f, indent=2)
        "
        cd ../frontend
        npm ci
        npx openapi-typescript openapi.json -o src/services/api.d.ts.tmp
        diff src/services/api.d.ts src/services/api.d.ts.tmp || (echo "api.d.ts is out of date. Run 'npm run generate-types' and commit the result." && exit 1)
        rm src/services/api.d.ts.tmp

    - name: Run Pytest
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/awa_test
      run: pytest app/tests/

  frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Lint frontend
      working-directory: ./frontend
      run: npm run lint

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
